name: Upsert Embeddings

on:
  push:
    branches: [main]
    paths:
      - "content/posts/**"

jobs:
  upsert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate posts JSON
        run: bunx tsx scripts/generate-posts-json.ts

      - name: Restore embedding hashes
        uses: actions/cache@v4
        with:
          path: src/shared/generated/embeddings-hash.json
          key: embeddings-hash-${{ hashFiles('content/posts/**') }}
          restore-keys: embeddings-hash-

      - name: Upsert embeddings
        run: bunx tsx scripts/upsert-embeddings.ts
        env:
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
